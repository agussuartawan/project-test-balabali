services:
  postgres:
    image: postgres:16-alpine
    container_name: balabali-postgres
    environment:
      POSTGRES_DB: project_test_balabali
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_test_balabali"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: balabali-api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/project_test_balabali?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
